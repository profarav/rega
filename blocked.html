<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked by Rega</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        width: min(560px, 92vw);
        border: 1px solid #374151;
        border-radius: 12px;
        padding: 24px;
        background: #1f2937;
      }

      .quote {
        margin-top: 0;
        padding-top: 0;
      }

      .quote-text {
        font-size: 15px;
        font-style: italic;
        color: #9ca3af;
        line-height: 1.6;
      }

      .quote-author {
        margin-top: 8px !important;
        font-size: 13px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <div class="quote">
        <p class="quote-text" id="quote-text"></p>
        <p class="quote-author" id="quote-author"></p>
      </div>
    </section>

    <script src="blocked.js"></script>
  </body>
</html>
