<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rega Focus</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <section id="dashboard-view" class="view hidden" data-active="false">
        <h1 class="title">Tap to Focus</h1>

        <button id="focus-orb" class="focus-orb" type="button" aria-label="Toggle focus blocking">
          <span class="orb-highlight"></span>
          <span class="orb-band"></span>
        </button>

        <button id="details-toggle" class="details-toggle" type="button" aria-expanded="false">
          My Focus <span class="chevron">›</span>
        </button>

        <div id="menu-panel" class="menu-panel hidden" aria-hidden="true">
          <button id="logout-btn" type="button" class="menu-btn">Logout</button>
        </div>
      </section>

      <section id="session-view" class="view hidden">
        <div class="session-topbar">
          <div class="session-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            Focus Session
          </div>
          <div class="session-dots" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
        </div>

        <div class="session-center">
          <div class="session-timer-wrap">
            <span class="session-label">Time Elapsed</span>
            <div id="session-timer" class="session-timer" aria-live="off" aria-label="Session duration">0:00</div>
          </div>
        </div>

        <button id="emergency-exit-btn" type="button" class="emergency-exit-btn" aria-label="Emergency exit — end focus session">
          <span class="emergency-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </span>
          <span class="emergency-text">Emergency Exit</span>
        </button>
      </section>

      <section id="login-view" class="view hidden">
        <h1 class="title">Tap to Focus</h1>

        <form id="login-form" class="login-card">
          <p class="login-label">Login to Rega</p>

          <label class="field" for="email">Email</label>
          <input id="email" type="email" autocomplete="username" required />

          <label class="field" for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required />

          <button type="submit" class="login-btn">Enter Focus</button>
        </form>
      </section>

      <p id="error" class="error hidden"></p>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
